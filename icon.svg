<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="55%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0B0F19"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C5A059" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C5A059" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer mandala ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.5"/>
  <!-- Mid ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4 12" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#4F46E5" stroke-width="0.8" opacity="0.3"/>

  <!-- 4 phase moons — positioned at N/E/S/W -->

  <!-- North: 🌑 New Moon -->
  <circle cx="256" cy="52" r="28" fill="#0B0F19" stroke="#C5A059" stroke-width="2" opacity="0.9"/>
  <!-- Small dark circle inside -->
  <circle cx="256" cy="52" r="18" fill="#0a0d17"/>

  <!-- East: 🌓 First Quarter (right half lit) -->
  <circle cx="460" cy="256" r="28" fill="#0B0F19" stroke="#C5A059" stroke-width="2" opacity="0.9"/>
  <path d="M460 228 a28 28 0 0 1 0 56" fill="#C5A059" opacity="0.9"/>

  <!-- South: 🌕 Full Moon -->
  <circle cx="256" cy="460" r="28" fill="#C5A059" opacity="0.95"/>
  <circle cx="256" cy="460" r="28" fill="none" stroke="#d4b070" stroke-width="1.5"/>

  <!-- West: 🌗 Last Quarter (left half lit) -->
  <circle cx="52" cy="256" r="28" fill="#0B0F19" stroke="#C5A059" stroke-width="2" opacity="0.9"/>
  <path d="M52 228 a28 28 0 0 0 0 56" fill="#C5A059" opacity="0.9"/>

  <!-- Diagonal small ornaments -->
  <circle cx="437" cy="75" r="5" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="75" cy="437" r="5" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="437" cy="437" r="5" fill="#4F46E5" opacity="0.5"/>
  <circle cx="75" cy="75" r="5" fill="#4F46E5" opacity="0.5"/>

  <!-- Luna crescent — upper right area, decorative -->
  <path d="M370 80 a45 45 0 1 1 0 60 a32 32 0 1 0 0-60z" fill="#C5A059" opacity="0.85"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="100" fill="url(#goldGlow)"/>

  <!-- Center "CL" text -->
  <text x="256" y="278" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="90" font-weight="600" fill="#C5A059" letter-spacing="-2"
        style="text-shadow: 0 0 30px rgba(197,160,89,0.5)">CL</text>

  <!-- Subtitle dots -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" fill="#8B5CF6" opacity="0.7">✦ ✧ ☽ ✧ ✦</text>
</svg>
